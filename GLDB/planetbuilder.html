<head>
    <script type="text/javascript" charset="utf8" src="./planetbuildertool.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<h2>Planet Builder</h2>
<div id="starting">
    <label for="starting-size-input">Starting Size: </label><select id="starting-size-input"
        name="starting-size-input"></select>
    <label for="starting-type-input">Starting Type: </label><select id="starting-type-input"
        name="starting-type-input"></select>
    <label for="starting-image-input">Starting Image: </label><select id="starting-image-input"
        name="starting-image-input"></select>
    <div id="image-preview"></div>
    <button id="complete-starting" onclick="finishSetup()">Finish Setup</input>
</div>
<div id="builder" hidden="true">
    <img id="builder-image">
    <span id="builder-size"></span>
    <span id="builder-type"></span>
    <div>
        <div style="float: left; height: 500; width: 300; overflow-y: auto">
            <style>
                [role="option"] {
                    position: relative;
                    display: block;
                    margin: 2px;
                    padding: 2px 1em 2px 1.5em;
                    line-height: 1.8em;
                    cursor: pointer;
                }

                [role="listbox"]:focus [role="option"].focused,
                [role="option"]:hover {
                    outline: 2px solid currentcolor;
                }
            </style>
            <ul role="listbox" id="artifact-list">
            </ul>
        </div>
        <div style="float: left; height: 500; width: 300; overflow-y: auto">
            <span>Log</span>
            <span id="log"></span>
        </div>
        <div style="float: left; height: 500; width: 300; overflow-y: auto">
            <span>Structures</span>
            <span id="structures"></span>
        </div>
        <div>
            <span>Artifact Stats</span><br>
            <span id="arti-stats"></span><br>
            <span>Mining Stats</span><br>
            <span id="min-stats"></span><br>
            <span>Research Stats</span><br>
            <span id="res-stats"></span><br>
            <span>Influence Stats</span><br>
            <span id="inf-stats"></span><br>
            <span>Cloak Stats</span><br>
            <span id="cl-stats"></span><br>
            <span>Population Stats</span><br>
            <span id="pop-stats"></span><br>
            <span>Attack Stats</span><br>
            <span id="at-stats"></span><br>
            <span>Defense Stats</span><br>
            <span id="def-stats"></span><br>
        </div>
    </div>
</div>
